name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        subproject: [plugin, mod]
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Build and test ${{ matrix.subproject }}
        run: ./gradlew :${{ matrix.subproject }}:check

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.subproject }}
          path: ${{ matrix.subproject }}/build/libs/*.jar
          retention-days: 7
