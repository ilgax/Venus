name: Venus
version: '${version}'
main: dev.xcyn.venus.Venus
api-version: '1.21'
description: In-game server management over plugin messaging channels
authors:
  - xcyn
license: AGPL-3.0-or-later

commands:
  venus:
    description: Venus admin command
    usage: /<command> <reload>
    permission: venus.admin

permissions:
  venus.admin:
    description: Allows use of Venus admin commands
    default: op